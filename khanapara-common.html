<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khanapara Teer Common Number Today | খানাপাড়া তীর কমন নাম্বার</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* shillong-common.html এর মতো একই CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f1419; padding: 0.8rem; }
        .container { max-width: 100%; margin: 0 auto; background: #ffffff; border-radius: 1.2rem; padding: 1rem; }
        .common-venue-card { background: linear-gradient(135deg, #fffaf2, #fff5e8); border-radius: 0.9rem; padding: 0.8rem; border: 2px solid #e8b86b; margin-bottom: 1rem; }
        .common-venue-title { background: linear-gradient(95deg, #1565c0, #0d47a1); color: #ffecb3; padding: 8px 12px; border-radius: 50px; font-weight: 800; font-size: 0.95rem; margin-bottom: 12px; text-align: center; }
        .common-table { width: 100%; border-collapse: collapse; background: white; border-radius: 0.7rem; overflow: hidden; }
        .common-table th { background: #1565c0; color: white; padding: 8px; font-size: 0.85rem; }
        .common-table td { padding: 10px; text-align: center; border: 1px solid #ffe0bc; font-size: 0.9rem; }
        .round-cell { font-weight: 800; background: #f5e6d3; color: #9b4b1a; }
        .direct-num { background: #1565c0; color: white; padding: 4px 10px; border-radius: 40px; font-weight: 800; display: inline-block; }
        .house-num { background: #1f6392; color: white; padding: 4px 10px; border-radius: 40px; font-weight: 800; display: inline-block; }
        .ending-num { background: #2c6e2f; color: white; padding: 4px 10px; border-radius: 40px; font-weight: 800; display: inline-block; }
        .back-btn { display: inline-block; padding: 0.6rem 2rem; border-radius: 50px; font-weight: 700; text-decoration: none; font-size: 0.95rem; background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; border: 2px solid #42a5f5; margin-top: 1rem; }
        .back-btn:hover { background: linear-gradient(135deg, #1976d2, #0d47a1); }
        .header-title { text-align: center; margin-bottom: 1rem; }
        .header-title h1 { font-size: 1.5rem; color: #1565c0; }
        .header-title p { color: #666; font-size: 0.9rem; }
        .common-time-badge { background: linear-gradient(95deg, #1565c0, #0d47a1); color: #ffda88; font-size: 0.8rem; padding: 0.4rem; border-radius: 50px; text-align: center; margin-bottom: 1rem; }
        .last-updated { text-align: center; font-size: 0.75rem; color: #888; margin-top: 0.5rem; }
        @media (max-width: 768px) {
            .container { padding: 0.6rem; }
            .common-table th, .common-table td { padding: 4px 6px; font-size: 0.7rem; }
            .direct-num, .house-num, .ending-num { padding: 2px 5px; font-size: 0.75rem; }
            .header-title h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-title">
        <h1>🎯 Khanapara Teer Common Number Today</h1>
        <p>খানাপাড়া তীর আজকের কমন নাম্বার</p>
    </div>
    <div class="common-time-badge">⭐ TODAY'S COMMON NUMBERS (7 Formula Analysis) | আজকের কমন নাম্বার (৭ ফর্মুলা বিশ্লেষণ)</div>
    
    <!-- 🔥 Container for common numbers - এই ID দিয়ে JavaScript আপডেট করবে -->
    <div id="commonContainer"></div>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="index.html" class="back-btn">⬅️ Back to Home | হোমে ফিরুন</a>
    </div>
    
    <div class="last-updated" id="lastUpdated">⏳ আপডেট হচ্ছে...</div>
</div>

<script>
// ============================================================
// Supabase Setup
// ============================================================
const SUPABASE_URL = 'https://bwjjqidmeooyojjvtqjs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ampxaWRtZW9veW9qanZ0cWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDIxMTAsImV4cCI6MjA5NjUxODExMH0.sRbG-Pwd8kgy94e9g7uuWhAj0-mH6JjOC7KXARxLIEk';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// 🔥 IST TIME ZONE FIX
// ============================================================
function getTodayIST() {
    const now = new Date();
    const istOffset = 5.5 * 60 * 60 * 1000;
    const istTime = new Date(now.getTime() + istOffset);
    return istTime.toISOString().split('T')[0];
}

// ============================================================
// 🔥 ডিফল্ট কমন নাম্বার ডেটা (Supabase এ ডেটা না থাকলে)
// ============================================================
const defaultCommonData = {
    result_date: getTodayIST(),
    
    // Khanapara (শুধু Khanapara দেখাবে)
    khanapara_fr_direct: '35, 72, 19',
    khanapara_fr_house: '3, 7',
    khanapara_fr_ending: '5, 2',
    khanapara_sr_direct: '64, 91, 28',
    khanapara_sr_house: '6, 9',
    khanapara_sr_ending: '4, 1'
};

// ============================================================
// 🔥 Khanapara Common Number Load - Supabase থেকে
// ============================================================
async function loadCommonNumbers() {
    try {
        const today = getTodayIST();
        console.log('📅 Loading Khanapara Common Numbers for:', today);
        
        const { data, error } = await supabaseClient
            .from('teer_common_numbers')
            .select('*')
            .eq('result_date', today)
            .limit(1);
            
        const container = document.getElementById('commonContainer');
        if (!container) return;
        
        if (!error && data && data.length > 0) {
            // শুধু Khanapara এর ডেটা রেন্ডার করুন
            renderCommonNumbers(data[0]);
        } else {
            // ডেটা না থাকলে ডিফল্ট দেখান
            renderDefaultCommonNumbers();
        }
        
        // Last updated time
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('lastUpdated').innerHTML = `🔄 শেষ আপডেট: ${timeStr} IST`;
        
    } catch(err) {
        console.error('❌ Error loading common numbers:', err);
        renderDefaultCommonNumbers();
    }
}

// ============================================================
// 🔥 কমন নাম্বার রেন্ডার (Supabase ডেটা থেকে)
// ============================================================
function renderCommonNumbers(data) {
    const container = document.getElementById('commonContainer');
    if (!container) return;
    
    // শুধু Khanapara দেখাবে
    const prefix = 'khanapara';
    const venueName = 'KHANAPARA TEER';
    
    const frDirect = data[`${prefix}_fr_direct`] || '--';
    const frHouse = data[`${prefix}_fr_house`] || '--';
    const frEnding = data[`${prefix}_fr_ending`] || '--';
    const srDirect = data[`${prefix}_sr_direct`] || '--';
    const srHouse = data[`${prefix}_sr_house`] || '--';
    const srEnding = data[`${prefix}_sr_ending`] || '--';
    
    container.innerHTML = `
        <div class="common-venue-card">
            <div class="common-venue-title">🔢 ${venueName} - COMMON NUMBERS</div>
            <table class="common-table">
                <thead>
                    <tr>
                        <th>ROUND</th>
                        <th>🔢 DIRECT NUMBER</th>
                        <th>🏠 HOUSE DIGIT</th>
                        <th>🎯 ENDING DIGIT</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="round-cell">FIRST ROUND (FR)</td>
                        <td><span class="direct-num">${frDirect}</span></td>
                        <td><span class="house-num">${frHouse}</span></td>
                        <td><span class="ending-num">${frEnding}</span></td>
                    </tr>
                    <tr>
                        <td class="round-cell">SECOND ROUND (SR)</td>
                        <td><span class="direct-num">${srDirect}</span></td>
                        <td><span class="house-num">${srHouse}</span></td>
                        <td><span class="ending-num">${srEnding}</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    `;
}

// ============================================================
// 🔥 ডিফল্ট কমন নাম্বার রেন্ডার (Supabase এ ডেটা না থাকলে)
// ============================================================
function renderDefaultCommonNumbers() {
    const container = document.getElementById('commonContainer');
    if (!container) return;
    
    const data = defaultCommonData;
    const prefix = 'khanapara';
    const venueName = 'KHANAPARA TEER';
    
    const frDirect = data[`${prefix}_fr_direct`] || '--';
    const frHouse = data[`${prefix}_fr_house`] || '--';
    const frEnding = data[`${prefix}_fr_ending`] || '--';
    const srDirect = data[`${prefix}_sr_direct`] || '--';
    const srHouse = data[`${prefix}_sr_house`] || '--';
    const srEnding = data[`${prefix}_sr_ending`] || '--';
    
    container.innerHTML = `
        <div class="common-venue-card">
            <div class="common-venue-title">🔢 ${venueName} - COMMON NUMBERS</div>
            <table class="common-table">
                <thead>
                    <tr>
                        <th>ROUND</th>
                        <th>🔢 DIRECT NUMBER</th>
                        <th>🏠 HOUSE DIGIT</th>
                        <th>🎯 ENDING DIGIT</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="round-cell">FIRST ROUND (FR)</td>
                        <td><span class="direct-num">${frDirect}</span></td>
                        <td><span class="house-num">${frHouse}</span></td>
                        <td><span class="ending-num">${frEnding}</span></td>
                    </tr>
                    <tr>
                        <td class="round-cell">SECOND ROUND (SR)</td>
                        <td><span class="direct-num">${srDirect}</span></td>
                        <td><span class="house-num">${srHouse}</span></td>
                        <td><span class="ending-num">${srEnding}</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    `;
}

// ============================================================
// 🔥 গ্লোবাল ফাংশন - মুল পেজ থেকে কল করার জন্য
// ============================================================
// এই ফাংশনটি মুল পেজ থেকে কল করলে Khanapara Common সাবপেজ আপডেট হবে
window.updateKhanaparaCommonSubPage = function(commonData) {
    const container = document.getElementById('commonContainer');
    if (!container) return;
    
    if (commonData) {
        renderCommonNumbers(commonData);
    } else {
        renderDefaultCommonNumbers();
    }
    
    // Last updated time
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('lastUpdated').innerHTML = `🔄 শেষ আপডেট: ${timeStr} IST`;
};

// ============================================================
// 📌 DOMContentLoaded
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    console.log('✅ Khanapara Common Number Page Loaded');
    loadCommonNumbers();
    
    // প্রতি 30 সেকেন্ড পর পর আপডেট চেক করুন (কমন নাম্বার কম আপডেট হয়)
    setInterval(loadCommonNumbers, 30000);
});

console.log('✅ Khanapara Common Number functions loaded successfully!');
</script>
</body>
</html>
