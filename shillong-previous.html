// 🔥 মাস অনুযায়ী ফলাফল দেখানো
// ============================================================
function displayMonthResults(monthIndex) {
    const tbody = document.getElementById('resultsTableBody');
    if (!tbody) return;
    
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const data = allMonthData[monthIndex] || [];
    
    let html = '';
    if (data.length === 0) {
        html = `<tr><td colspan="3" class="no-data">${monthNames[monthIndex]} 2026 - No results available yet</td></tr>`;
    } else {
        data.forEach(row => {
            const frDisplay = row.fr === '--' ? '—' : row.fr;
            const srDisplay = row.sr === '--' ? '—' : row.sr;
            html += `<tr><td style="padding:8px;">${row.date}</td><td style="padding:8px; font-weight:${row.fr !== '--' ? '700' : '400'}; color:${row.fr !== '--' ? '#2c6e2f' : '#999'};">${frDisplay}</td><td style="padding:8px; font-weight:${row.sr !== '--' ? '700' : '400'}; color:${row.sr !== '--' ? '#c62828' : '#999'};">${srDisplay}</td></tr>`;
        });
    }
    tbody.innerHTML = html;
    
    // Last updated time
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('lastUpdated').innerHTML = `🔄 শেষ আপডেট: ${timeStr} IST`;
}

// ============================================================
// 🔥 সেটআপ মাস সিলেক্টর
// ============================================================
function setupMonthSelector() {
    const select = document.getElementById('monthSelect');
    if (select) {
        // বর্তমান মাস সেট করুন
        const currentMonth = new Date().getMonth();
        select.value = currentMonth.toString();
        displayMonthResults(currentMonth);
        
        select.addEventListener('change', function() {
            displayMonthResults(parseInt(this.value));
        });
    }
}

// ============================================================
// 🔥 গ্লোবাল ফাংশন - মুল পেজ থেকে কল করার জন্য
// ============================================================
// এই ফাংশনটি মুল পেজ থেকে কল করলে Previous Result সাবপেজ আপডেট হবে
window.updatePreviousResultSubPage = function(monthIndex) {
    if (monthIndex !== undefined) {
        const select = document.getElementById('monthSelect');
        if (select) {
            select.value = monthIndex.toString();
            displayMonthResults(monthIndex);
        }
    } else {
        // বর্তমান মাস দেখান
        const currentMonth = new Date().getMonth();
        displayMonthResults(currentMonth);
    }
};

// ============================================================
// 🔥 Supabase থেকে ডেটা লোড (যদি প্রয়োজন হয়)
// ============================================================
async function loadPreviousResultsFromSupabase() {
    try {
        const { data, error } = await supabaseClient
            .from('teer_live_results')
            .select('*')
            .eq('venue', 'shillong')
            .order('result_date', { ascending: false })
            .limit(30);
            
        if (!error && data && data.length > 0) {
            console.log('✅ Loaded previous results from Supabase:', data.length);
            // এখানে Supabase ডেটা দিয়ে টেবিল আপডেট করতে পারেন
        }
    } catch(err) {
        console.error('❌ Error loading from Supabase:', err);
    }
}

    setInterval(function() {
        const select = document.getElementById('monthSelect');
        if (select) {
            displayMonthResults(parseInt(select.value));
        }
    }, 30000);
});
