<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Teer Result Today | নাইট তীর রেজাল্ট</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f1419; padding: 0.8rem; }
        .container { max-width: 100%; margin: 0 auto; background: #ffffff; border-radius: 1.2rem; padding: 1rem; }
        .result-card { background: #ffffff; border-radius: 0.9rem; padding: 0.8rem; border: 2px solid #f5b642; border-top: 4px solid #1a237e; }
        .venue-header { background: #1a237e; border-radius: 50px; padding: 0.35rem 0.8rem; text-align: center; margin-bottom: 0.6rem; }
        .venue-name { font-size: 1rem; font-weight: 800; color: #ffe6b3; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; flex-wrap: wrap; }
        .date-box { background: #ece3d8; font-size: 0.8rem; font-weight: 600; padding: 0.25rem 0.8rem; border-radius: 50px; }
        .flash-waiting { background: #dc2626; color: white; font-size: 0.75rem; font-weight: bold; padding: 0.25rem 0.8rem; border-radius: 30px; animation: flashWaiting 0.8s infinite; display: inline-block; }
        @keyframes flashWaiting { 0%,100% { background: #dc2626; } 50% { background: #ff0000; } }
        .live-result-badge { background: #dc2626; color: white; font-size: 0.8rem; font-weight: bold; padding: 0.25rem 0.9rem; border-radius: 30px; animation: flashLive 0.6s infinite; display: inline-block; }
        @keyframes flashLive { 0%,100% { background: #dc2626; } 50% { background: #ff3333; box-shadow: 0 0 8px #ff4444; } }
        .live-result-badge::before { content: "●"; animation: blinkDot 0.5s infinite; }
        @keyframes blinkDot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .timing-dual { display: flex; gap: 0.8rem; margin: 0.6rem 0; }
        .fr-box, .sr-box { flex: 1; text-align: center; background: #faf3e8; border-radius: 0.8rem; padding: 0.5rem; border: 1px solid #e8d5c0; }
        .result-number { font-size: 1.6rem; font-weight: 900; background: #f5f0e8; display: inline-block; padding: 0.2rem 1rem; border-radius: 40px; color: #1a237e; }
        .waiting-number-display { background: #dc2626; color: white; font-size: 0.8rem; font-weight: bold; padding: 0.3rem 0.7rem; border-radius: 40px; display: inline-block; animation: blinkWaiting 0.6s infinite; }
        @keyframes blinkWaiting { 0%,100% { opacity: 1; background: #dc2626; } 50% { opacity: 0.7; background: #ff0000; } }
        .back-btn { display: inline-block; padding: 0.6rem 2rem; border-radius: 50px; font-weight: 700; text-decoration: none; font-size: 0.95rem; background: linear-gradient(135deg, #1a237e, #0d1442); color: white; border: 2px solid #5c6bc0; margin-top: 1rem; }
        .back-btn:hover { background: linear-gradient(135deg, #283593, #0d1442); }
        .header-title { text-align: center; margin-bottom: 1rem; }
        .header-title h1 { font-size: 1.5rem; color: #1a237e; }
        .header-title p { color: #666; font-size: 0.9rem; }
        .last-updated { text-align: center; font-size: 0.75rem; color: #888; margin-top: 0.5rem; }
        .night-date-note { text-align: center; font-size: 0.7rem; color: #e67e22; margin-top: 0.3rem; font-weight: 600; }
        @media (max-width: 768px) {
            .container { padding: 0.6rem; }
            .result-number { font-size: 1.2rem; }
            .timing-dual { flex-direction: column; }
            .header-title h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-title">
        <h1>🌙 Night Teer Result Today</h1>
        <p>নাইট তীর আজকের রেজাল্ট</p>
        <p class="night-date-note">⏰ নাইট তীরের রেজাল্ট আগের দিনের দেখায় (কারণ রাতে খেলা হয়)</p>
    </div>
    
    <!-- 🔥 Container for result - এই ID দিয়ে JavaScript আপডেট করবে -->
    <div id="nightResultContainer"></div>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="index.html" class="back-btn">⬅️ Back to Home | হোমে ফিরুন</a>
    </div>
    
    <div class="last-updated" id="lastUpdated">⏳ আপডেট হচ্ছে...</div>
</div>

<script>
// ============================================================
// Supabase Setup
// ============================================================
const SUPABASE_URL = 'https://bwjjqidmeooyojjvtqjs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ampxaWRtZW9veW9qanZ0cWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDIxMTAsImV4cCI6MjA5NjUxODExMH0.sRbG-Pwd8kgy94e9g7uuWhAj0-mH6JjOC7KXARxLIEk';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// 🔥 IST TIME ZONE FIX
// ============================================================
function getTodayIST() {
    const now = new Date();
    const istOffset = 5.5 * 60 * 60 * 1000;
    const istTime = new Date(now.getTime() + istOffset);
    return istTime.toISOString().split('T')[0];
}

// ============================================================
// 🔥 NIGHT TEER - গতকালের তারিখ (ডেটাবেস কোয়েরির জন্য)
// ============================================================
function getNightDate() {
    const today = getTodayIST();
    const dateObj = new Date(today);
    dateObj.setDate(dateObj.getDate() - 1);
    return dateObj.toISOString().split('T')[0];
}

// ============================================================
// 🔥 WAITING চেক - Night এর জন্য (১০ মিনিট আগে)
// ============================================================
function isNightWaiting(roundType) {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const totalMinutes = hours * 60 + minutes;
    
    // FR: 11:10 PM (23:10) - 10 min আগে মানে 11:00 PM (23:00)
    // SR: 12:10 AM (00:10) - 10 min আগে মানে 12:00 AM (00:00)
    if (roundType === 'fr') {
        // 11:00 PM (23:00) থেকে 11:10 PM (23:10) এর মধ্যে WAITING
        return totalMinutes >= 1380 && totalMinutes < 1390;
    } else if (roundType === 'sr') {
        // 12:00 AM (00:00) থেকে 12:10 AM (00:10) এর মধ্যে WAITING
        return totalMinutes >= 0 && totalMinutes < 10;
    }
    return false;
}

// ============================================================
// 🔥 Night Teer Result Load - Supabase থেকে (গতকালের তারিখ)
// ============================================================
async function loadNightTeerResult() {
    try {
        const today = getTodayIST();
        const nightDate = getNightDate();
        console.log('📅 Today (IST):', today);
        console.log('🌙 Night Date (for DB query):', nightDate);
        
        const { data, error } = await supabaseClient
            .from('teer_live_results')
            .select('*')
            .eq('venue', 'night')
            .eq('result_date', nightDate);
            
        const container = document.getElementById('nightResultContainer');
        if (!container) return;
        
        let frResult = '--';
        let srResult = '--';
        
        if (!error && data && data.length > 0) {
            frResult = data[0].fr_result || '--';
            srResult = data[0].sr_result || '--';
        }
        
        // WAITING চেক - Night এর জন্য আলাদা
        const isFRWaiting = isNightWaiting('fr');
        const isSRWaiting = isNightWaiting('sr');
        
        const frDisplay = isFRWaiting ? 
            `<span class="waiting-number-display">⏳ WAITING</span>` : 
            `<span class="result-number">${frResult}</span>`;
        const srDisplay = isSRWaiting ? 
            `<span class="waiting-number-display">⏳ WAITING</span>` : 
            `<span class="result-number">${srResult}</span>`;
        
        const hasData = (frResult !== '--' || srResult !== '--');
        const badgeClass = hasData ? 'live-result-badge' : 'flash-waiting';
        const badgeText = hasData ? '🔴 LIVE' : '⏳ WAITING';
        
        // ✅ Night সাবপেজে আজকের তারিখ দেখাবে, কিন্তু রেজাল্ট আগের দিনের
        container.innerHTML = `
            <div class="result-card">
                <div class="venue-header">
                    <span class="venue-name">🌙 NIGHT TEER</span>
                </div>
                <div class="info-row">
                    <span class="date-box">📅 ${today}</span>
                    <span class="${badgeClass}">${badgeText}</span>
                </div>
                <div class="timing-dual">
                    <div class="fr-box">
                        <div>FIRST ROUND (11:10 PM)</div>
                        ${frDisplay}
                    </div>
                    <div class="sr-box">
                        <div>SECOND ROUND (12:10 AM)</div>
                        ${srDisplay}
                    </div>
                </div>
                <div style="text-align:center; font-size:0.65rem; color:#888; margin-top:0.3rem;">
                    ⏰ রেজাল্ট দেখাচ্ছে ${nightDate} তারিখের (আগের দিনের)
                </div>
            </div>
        `;
        
        // Last updated time
        const now = new Date();
        const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        document.getElementById('lastUpdated').innerHTML = `🔄 শেষ আপডেট: ${timeStr} IST`;
        
    } catch(err) {
        console.error('❌ Error loading Night results:', err);
        const container = document.getElementById('nightResultContainer');
        if (container) {
            const today = getTodayIST();
            const nightDate = getNightDate();
            container.innerHTML = `
                <div class="result-card">
                    <div class="venue-header">
                        <span class="venue-name">🌙 NIGHT TEER</span>
                    </div>
                    <div class="info-row">
                        <span class="date-box">📅 ${today}</span>
                        <span class="flash-waiting">⏳ WAITING</span>
                    </div>
                    <div class="timing-dual">
                        <div class="fr-box">
                            <div>FIRST ROUND (11:10 PM)</div>
                            <div class="waiting-number-display">⏳ WAITING</div>
                        </div>
                        <div class="sr-box">
                            <div>SECOND ROUND (12:10 AM)</div>
                            <div class="waiting-number-display">⏳ WAITING</div>
                        </div>
                    </div>
                    <div style="text-align:center; font-size:0.65rem; color:#888; margin-top:0.3rem;">
                        ⏰ রেজাল্ট দেখাচ্ছে ${nightDate} তারিখের (আগের দিনের)
                    </div>
                </div>
            `;
        }
    }
}

// ============================================================
// 🔥 গ্লোবাল ফাংশন - মুল পেজ থেকে কল করার জন্য
// ============================================================
// এই ফাংশনটি মুল পেজ থেকে কল করলে Night সাবপেজ আপডেট হবে
window.updateNightSubPage = function(liveData) {
    const container = document.getElementById('nightResultContainer');
    if (!container) return;
    
    const today = getTodayIST();
    const nightDate = getNightDate();
    const data = liveData.night || { fr: '--', sr: '--' };
    
    // WAITING চেক - Night এর জন্য আলাদা
    const isFRWaiting = isNightWaiting('fr');
    const isSRWaiting = isNightWaiting('sr');
    
    const frDisplay = isFRWaiting ? 
        `<span class="waiting-number-display">⏳ WAITING</span>` : 
        `<span class="result-number">${data.fr}</span>`;
    const srDisplay = isSRWaiting ? 
        `<span class="waiting-number-display">⏳ WAITING</span>` : 
        `<span class="result-number">${data.sr}</span>`;
    
    const hasData = (data.fr !== '--' || data.sr !== '--');
    const badgeClass = hasData ? 'live-result-badge' : 'flash-waiting';
    const badgeText = hasData ? '🔴 LIVE' : '⏳ WAITING';
    
    // ✅ Night সাবপেজে আজকের তারিখ দেখাবে, কিন্তু রেজাল্ট আগের দিনের
    container.innerHTML = `
        <div class="result-card">
            <div class="venue-header">
                <span class="venue-name">🌙 NIGHT TEER</span>
            </div>
            <div class="info-row">
                <span class="date-box">📅 ${today}</span>
                <span class="${badgeClass}">${badgeText}</span>
            </div>
            <div class="timing-dual">
                <div class="fr-box">
                    <div>FIRST ROUND (11:10 PM)</div>
                    ${frDisplay}
                </div>
                <div class="sr-box">
                    <div>SECOND ROUND (12:10 AM)</div>
                    ${srDisplay}
                </div>
            </div>
            <div style="text-align:center; font-size:0.65rem; color:#888; margin-top:0.3rem;">
                ⏰ রেজাল্ট দেখাচ্ছে ${nightDate} তারিখের (আগের দিনের)
            </div>
        </div>
    `;
    
    // Last updated time
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('lastUpdated').innerHTML = `🔄 শেষ আপডেট: ${timeStr} IST`;
};

// ============================================================
// 📌 DOMContentLoaded
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    console.log('✅ Night Teer Page Loaded');
    loadNightTeerResult();
    
    // প্রতি 10 সেকেন্ড পর পর আপডেট চেক করুন
    setInterval(loadNightTeerResult, 10000);
});

console.log('✅ Night Teer functions loaded successfully!');
</script>
</body>
</html>
