<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juwai Teer Result Today | জুওয়াই তীর রেজাল্ট</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f1419; padding: 0.8rem; }
        .container { max-width: 100%; margin: 0 auto; background: #ffffff; border-radius: 1.2rem; padding: 1rem; }
        .result-card { background: #ffffff; border-radius: 0.9rem; padding: 0.8rem; border: 2px solid #f5b642; border-top: 4px solid #e65100; }
        .venue-header { background: #e65100; border-radius: 50px; padding: 0.35rem 0.8rem; text-align: center; margin-bottom: 0.6rem; }
        .venue-name { font-size: 1rem; font-weight: 800; color: #ffe6b3; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; flex-wrap: wrap; }
        .date-box { background: #ece3d8; font-size: 0.8rem; font-weight: 600; padding: 0.25rem 0.8rem; border-radius: 50px; }
        .live-result-badge { background: #dc2626; color: white; font-size: 0.8rem; font-weight: bold; padding: 0.25rem 0.9rem; border-radius: 30px; animation: flashLive 0.6s infinite; display: inline-block; }
        @keyframes flashLive { 0%,100% { background: #dc2626; } 50% { background: #ff3333; } }
        .timing-dual { display: flex; gap: 0.8rem; margin: 0.6rem 0; }
        .fr-box, .sr-box { flex: 1; text-align: center; background: #faf3e8; border-radius: 0.8rem; padding: 0.5rem; border: 1px solid #e8d5c0; }
        .result-number { font-size: 1.6rem; font-weight: 900; background: #f5f0e8; display: inline-block; padding: 0.2rem 1rem; border-radius: 40px; color: #e65100; }
        .waiting-number-display { background: #dc2626; color: white; font-size: 0.8rem; font-weight: bold; padding: 0.3rem 0.7rem; border-radius: 40px; display: inline-block; animation: blinkWaiting 0.6s infinite; }
        @keyframes blinkWaiting { 0%,100% { opacity: 1; background: #dc2626; } 50% { opacity: 0.7; background: #ff0000; } }
        .back-btn { display: inline-block; padding: 0.6rem 2rem; border-radius: 50px; font-weight: 700; text-decoration: none; font-size: 0.95rem; background: linear-gradient(135deg, #e65100, #bf360c); color: white; border: 2px solid #ff9800; margin-top: 1rem; }
        .back-btn:hover { background: linear-gradient(135deg, #f57c00, #bf360c); }
        .header-title { text-align: center; margin-bottom: 1rem; }
        .header-title h1 { font-size: 1.5rem; color: #e65100; }
        .header-title p { color: #666; font-size: 0.9rem; }
        @media (max-width: 768px) {
            .container { padding: 0.6rem; }
            .result-number { font-size: 1.2rem; }
            .timing-dual { flex-direction: column; }
            .header-title h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-title">
        <h1>🏹 Juwai Teer Result Today</h1>
        <p>জুওয়াই তীর আজকের রেজাল্ট</p>
    </div>
    
    <div id="juwaiResultsGrid"></div>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="index.html" class="back-btn">⬅️ Back to Home | হোমে ফিরুন</a>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://bwjjqidmeooyojjvtqjs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ampxaWRtZW9veW9qanZ0cWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDIxMTAsImV4cCI6MjA5NjUxODExMH0.sRbG-Pwd8kgy94e9g7uuWhAj0-mH6JjOC7KXARxLIEk';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadJuwaiTeerResult() {
    try {
        const today = new Date().toISOString().split('T')[0];
        const { data, error } = await supabaseClient
            .from('teer_live_results')
            .select('*')
            .eq('venue', 'juwai')
            .eq('result_date', today);
            
        if (!error && data && data.length > 0) {
            const juwaiData = {};
            data.forEach(row => {
                juwaiData[row.venue] = {
                    fr: row.fr_result,
                    sr: row.sr_result
                };
            });
            renderJuwaiResult(juwaiData);
        } else {
            renderJuwaiResult({ juwai: { fr: '--', sr: '--' } });
        }
    } catch(err) {
        console.error('Error loading juwai results:', err);
        renderJuwaiResult({ juwai: { fr: '--', sr: '--' } });
    }
}

function renderJuwaiResult(data) {
    const grid = document.getElementById('juwaiResultsGrid');
    if (!grid) return;
    
    const today = new Date().toISOString().split('T')[0];
    const juwai = data.juwai || { fr: '--', sr: '--' };
    
    // Juwai time check: FR 2:00 PM, SR 3:30 PM
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes();
    const currentTime = hours + minutes/60;
    
    const isFRTime = currentTime < 14;
    const isSRTime = currentTime < 15.5;
    
    const frDisplay = isFRTime ? `<div class="waiting-number-display">⏳ WAITING</div>` : 
                     (juwai.fr !== '--' ? `<div class="result-number">${juwai.fr}</div>` : `<div class="waiting-number-display">⏳ WAITING</div>`);
    const srDisplay = isSRTime ? `<div class="waiting-number-display">⏳ WAITING</div>` : 
                     (juwai.sr !== '--' ? `<div class="result-number">${juwai.sr}</div>` : `<div class="waiting-number-display">⏳ WAITING</div>`);
    
    grid.innerHTML = `
        <div class="result-card">
            <div class="venue-header">
                <span class="venue-name">🏹 JUWAI TEER</span>
            </div>
            <div class="info-row">
                <span class="date-box">📅 ${today}</span>
                <span class="live-result-badge">🔴 LIVE</span>
            </div>
            <div class="timing-dual">
                <div class="fr-box">
                    <div>FIRST ROUND (2:00 PM)</div>
                    ${frDisplay}
                </div>
                <div class="sr-box">
                    <div>SECOND ROUND (3:30 PM)</div>
                    ${srDisplay}
                </div>
            </div>
        </div>
    `;
}

document.addEventListener('DOMContentLoaded', function() {
    loadJuwaiTeerResult();
});
</script>
</body>
</html>
