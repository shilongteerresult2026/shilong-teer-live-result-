        .common-venue-title { background: linear-gradient(95deg, #1565c0, #0d47a1); color: #ffecb3; padding: 8px 12px; border-radius: 50px; font-weight: 800; font-size: 0.95rem; margin-bottom: 12px; text-align: center; }
        .common-table { width: 100%; border-collapse: collapse; background: white; border-radius: 0.7rem; overflow: hidden; }

        .back-btn { display: inline-block; padding: 0.6rem 2rem; border-radius: 50px; font-weight: 700; text-decoration: none; font-size: 0.95rem; background: linear-gradient(135deg, #1565c0, #0d47a1); color: white; border: 2px solid #42a5f5; margin-top: 1rem; }
        .back-btn:hover { background: linear-gradient(135deg, #1976d2, #0d47a1); }
        .header-title { text-align: center; margin-bottom: 1rem; }
        .header-title h1 { font-size: 1.5rem; color: #1565c0; }
        .header-title p { color: #666; font-size: 0.9rem; }
        .common-time-badge { background: linear-gradient(95deg, #1565c0, #0d47a1); color: #ffda88; font-size: 0.8rem; padding: 0.4rem; border-radius: 50px; text-align: center; margin-bottom: 1rem; }
        @media (max-width: 768px) {
            .container { padding: 0.6rem; }
            .common-table th, .common-table td { padding: 4px 6px; font-size: 0.7rem; }
            .direct-num, .house-num, .ending-num { padding: 2px 5px; font-size: 0.75rem; }

<body>
<div class="container">
    <div class="header-title">
        <h1>🎯 Khanapara Teer Common Number Today</h1>
        <p>খানাপাড়া তীর আজকের কমন নাম্বার</p>
    </div>
    <div class="common-time-badge">⭐ TODAY'S COMMON NUMBERS (7 Formula Analysis) | আজকের কমন নাম্বার (৭ ফর্মুলা বিশ্লেষণ)</div>
    
    <div id="commonContainer"></div>
    
    <div style="text-align: center; margin-top: 1.5rem;">
        <a href="index.html" class="back-btn">⬅️ Back to Home | হোমে ফিরুন</a>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://bwjjqidmeooyojjvtqjs.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3ampxaWRtZW9veW9qanZ0cWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDIxMTAsImV4cCI6MjA5NjUxODExMH0.sRbG-Pwd8kgy94e9g7uuWhAj0-mH6JjOC7KXARxLIEk';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function loadCommonNumbers() {
    try {
        const today = new Date().toISOString().split('T')[0];
        const { data, error } = await supabaseClient
            .from('teer_common_numbers')
            .select('*')
            .eq('date', today)
            .limit(1);
            
        if (!error && data && data.length > 0) {
            renderCommonNumbers(data[0]);
        } else {
            renderDefaultCommonNumbers();
        }
    } catch(err) {
        console.error('Error loading common numbers:', err);
        renderDefaultCommonNumbers();
    }
}

function renderCommonNumbers(data) {
    const container = document.getElementById('commonContainer');
    if (!container) return;
    
    const venues = [
        { id: 'shillong', name: 'SHILLONG TEER' },
        { id: 'khanapara', name: 'KHANAPARA TEER' },
        { id: 'juwai', name: 'JUWAI TEER' }
    ];
    
    let html = '';
    venues.forEach(v => {
        const prefix = v.id;
        html += `
            <div class="common-venue-card">
                <div class="common-venue-title">🔢 ${v.name} - COMMON NUMBERS</div>
                <table class="common-table">
                    <thead>
                        <tr>
                            <th>ROUND</th>
                            <th>🔢 DIRECT NUMBER</th>
                            <th>🏠 HOUSE DIGIT</th>
                            <th>🎯 ENDING DIGIT</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="round-cell">FIRST ROUND (FR)</td>
                            <td class="round-cell"><span class="direct-num">${data[`${prefix}_fr_direct`] || '--'}</span></td>
                            <td class="round-cell"><span class="house-num">${data[`${prefix}_fr_house`] || '--'}</span></td>
                            <td class="round-cell"><span class="ending-num">${data[`${prefix}_fr_ending`] || '--'}</span></td>
                        </tr>
                        <tr>
                            <td class="round-cell">SECOND ROUND (SR)</td>
                            <td class="round-cell"><span class="direct-num">${data[`${prefix}_sr_direct`] || '--'}</span></td>
                            <td class="round-cell"><span class="house-num">${data[`${prefix}_sr_house`] || '--'}</span></td>
                            <td class="round-cell"><span class="ending-num">${data[`${prefix}_sr_ending`] || '--'}</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

function renderDefaultCommonNumbers() {
    const container = document.getElementById('commonContainer');
    if (!container) return;
    
    const venues = [
        { id: 'shillong', name: 'SHILLONG TEER', frDirect: '47', srDirect: '20', frHouse: '4', frEnding: '7', srHouse: '2', srEnding: '0' },
        { id: 'khanapara', name: 'KHANAPARA TEER', frDirect: '52', srDirect: '35', frHouse: '5', frEnding: '2', srHouse: '3', srEnding: '5' },
        { id: 'juwai', name: 'JUWAI TEER', frDirect: '18', srDirect: '63', frHouse: '1', frEnding: '8', srHouse: '6', srEnding: '3' }
    ];
    
    let html = '';
    venues.forEach(v => {
        html += `
            <div class="common-venue-card">
                <div class="common-venue-title">🔢 ${v.name} - COMMON NUMBERS</div>
                <table class="common-table">
                    <thead>
                        <tr>
                            <th>ROUND</th>
                            <th>🔢 DIRECT NUMBER</th>
                            <th>🏠 HOUSE DIGIT</th>
                            <th>🎯 ENDING DIGIT</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="round-cell">FIRST ROUND (FR)</td>
                            <td class="round-cell"><span class="direct-num">${v.frDirect}</span></td>
                            <td class="round-cell"><span class="house-num">${v.frHouse}</span></td>
                            <td class="round-cell"><span class="ending-num">${v.frEnding}</span></td>
                        </tr>
                        <tr>
                            <td class="round-cell">SECOND ROUND (SR)</td>
                            <td class="round-cell"><span class="direct-num">${v.srDirect}</span></td>
                            <td class="round-cell"><span class="house-num">${v.srHouse}</span></td>
                            <td class="round-cell"><span class="ending-num">${v.srEnding}</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
    loadCommonNumbers();
});
</script>
</body>
</html>
