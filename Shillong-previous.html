    function displayResults(month) {
        const data = monthData[month] || [];
        const tbody = document.getElementById('resultsBody');
        
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align:center;padding:20px;">এই মাসে কোনো রেজাল্ট নেই</td></tr>`;
            updateStats([]);
            return;
        }
        
        let html = '';
        for (let row of data) {
            html += `<tr>
                <td><strong>${row.date}</strong></td>
                <td><span style="background:#e67e22;color:white;padding:2px 12px;border-radius:30px;">${row.fr}</span></td>
                <td><span style="background:#2c6e2f;color:white;padding:2px 12px;border-radius:30px;">${row.sr}</span></td>
            </tr>`;
        }
        tbody.innerHTML = html;
        updateStats(data);
    }

    function updateStats(data) {
        const total = data.length;
        document.getElementById('totalMatches').textContent = total;
        
        if (total === 0) {
            document.getElementById('avgFR').textContent = '--';
            document.getElementById('avgSR').textContent = '--';
            document.getElementById('highestNum').textContent = '--';
            return;
        }
        
        let frSum = 0, srSum = 0, highest = 0;
        for (let row of data) {
            let fr = parseInt(row.fr);
            let sr = parseInt(row.sr);
            frSum += fr;
            srSum += sr;
            if (fr > highest) highest = fr;
            if (sr > highest) highest = sr;
        }
        
        document.getElementById('avgFR').textContent = Math.round(frSum / total);
        document.getElementById('avgSR').textContent = Math.round(srSum / total);
        document.getElementById('highestNum').textContent = highest;
    }

    // Month selector

        displayResults(this.value);
    });
